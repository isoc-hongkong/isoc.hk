[[redirects]]
  from   = "/events/hkigf/hkigf-roundtable-jul-2018/"
  to     = "/news/hkigf-roundtable-jul-2018/"
  status = 301

# 4. WP custom-post-type prefixes collapsed under /news/
#    Content already exists at /news/<same-slug>/.
#    CJK-encoded slugs hit /news/<encoded>/ → /news/<pinyin>/ on second hop.

[[redirects]]
  from   = "/events/*"
  to     = "/news/:splat"
  status = 301

[[redirects]]
