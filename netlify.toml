  status = 301

[[redirects]]
  from   = "/my-bookings/"
  to     = "/404"
  status = 410

[[redirects]]
  from   = "/not-found/"
  to     = "/404"
  status = 410

# 6. /tag/<slug>/ → /category/<slug>/ (slugs that exist as Astro categories).
#    Must precede the /tag/* catch-all below — order matters.

[[redirects]]
  from   = "/tag/cloud/"
  to     = "/category/cloud/"
  status = 301

[[redirects]]
  from   = "/tag/internet-hall-of-fame/"
  to     = "/category/internet-hall-of-fame/"
  status = 301

[[redirects]]
  from   = "/tag/ipv6/"
  to     = "/category/ipv6/"
  status = 301

[[redirects]]
  from   = "/tag/startup/"
  to     = "/category/startup/"
  status = 301

[[redirects]]
  from   = "/tag/statement/"
  to     = "/category/statement/"
  status = 301

# 7. /tag/* catch-all → news index (Astro does not implement tag archives)

[[redirects]]
  from   = "/tag/*"
  to     = "/category/news/"
  status = 301

# 8. /ev/* — newer "ev" custom post type, content not yet migrated.
#    TODO: When /ev/ posts are migrated into src/content/news/,
#    change this to "to = /news/:splat".
[[redirects]]
  from   = "/ev/*"
  to     = "/category/events/"
  status = 301

# ──────────────────────────────────────────────────────────────────────
# End migration redirects
# ──────────────────────────────────────────────────────────────────────

