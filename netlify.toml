# Netlify build + redirect config.
# Redirects below were derived from the WordPress→Astro migration and are now
# manually maintained. Order matters: more specific rules must come before
# their prefix wildcards (see section comments below).

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

# Block WP admin/API endpoints
[[redirects]]
  from   = "/wp-admin/*"
  to     = "/404"
  status = 410

[[redirects]]
  from   = "/wp-login.php"
  to     = "/404"
  status = 410

[[redirects]]
  from   = "/xmlrpc.php"
  to     = "/404"
  status = 410

[[redirects]]
  from   = "/wp-json/*"
  to     = "/404"
  status = 410

# RSS feeds — Astro does not currently generate /feed/; mark both as Gone.
# When @astrojs/rss is added, change these back to a 301 to /feed/.
[[redirects]]
  from   = "/feed/"
  to     = "/404"
  status = 410

[[redirects]]
  from   = "/comments/feed/"
  to     = "/404"
  status = 410

# Author archives → news
[[redirects]]
  from   = "/author/*"
  to     = "/category/news/"
  status = 301

# Year/date archives → news
# Netlify placeholders (`:year`) must occupy a whole path segment, so the
# original `/20:year/` form never matched. A `/20*/` splat covers /2015/,
# /2015/03/, /2015/03/15/ in one rule (no /20*/ paths exist in dist).
[[redirects]]
  from   = "/20*"
  to     = "/category/news/"
  status = 301

# ──────────────────────────────────────────────────────────────────────
# WP → Astro path-prefix migration redirects. Order is significant:
#   1. Specific encoded-CJK paths (must precede their prefix wildcards)
#   2. Specific path → page rules
#   3. /events/categories/* (must precede /events/* wildcard)
#   4. Prefix wildcards → /news/:splat
#   5. Event-plugin artifacts (locations, taxonomy stubs)
#   6. /tag/<slug>/ → /category/<slug>/ specifics (must precede /tag/* catch-all)
#   7. /tag/* catch-all
#   8. /ev/* graceful fallback
# ──────────────────────────────────────────────────────────────────────

