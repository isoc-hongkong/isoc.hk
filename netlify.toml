# 3. Event-plugin sub-taxonomy fallback
#    Must precede /events/* — order matters.
[[redirects]]
  from   = "/events/categories/*"
  to     = "/category/events/"
  status = 301

# 3b. /events/hkigf/<slug>/ — WP had a nested hkigf event subtype;
#     Astro flattened to /news/<slug>/. Must precede /events/* wildcard.
[[redirects]]
  from   = "/events/hkigf/hkigf-combating-disinformation/"
  to     = "/news/hkigf-combating-disinformation/"
  status = 301

[[redirects]]
  from   = "/events/hkigf/hkigf-open-data/"
